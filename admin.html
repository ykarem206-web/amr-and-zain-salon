<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amr & Zain Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-black text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold italic">AMR & ZAIN ADMIN</h1>
            <button id="logout-btn" class="bg-red-600 px-4 py-2 rounded text-sm hover:bg-red-700 transition">تسجيل الخروج</button>
        </div>
    </nav>

    <main class="container mx-auto p-4 mt-8">
        <div class="bg-white p-6 rounded-lg shadow mb-6 border-t-4 border-red-600">
            <h3 class="font-bold text-gray-800 text-lg mb-4">🚫 إغلاق يوم محدد (إجازة/طوارئ)</h3>
            <div class="flex flex-col md:flex-row gap-4 items-center">
                <input type="date" id="block-date-input" class="border px-4 py-2 rounded-md w-full md:w-auto focus:ring-2 focus:ring-red-600 outline-none" dir="ltr">
                
                <select id="block-barber-input" class="border px-4 py-2 rounded-md w-full md:w-auto focus:ring-2 focus:ring-red-600 outline-none">
                    <option value="الكل">إغلاق الصالون بالكامل</option>
                    <option value="أبو عمرو">أبو عمرو فقط</option>
                    <option value="يوسف">يوسف فقط</option>
                    <option value="فكري">فكري فقط</option>
                </select>

                <button id="block-date-btn" class="w-full md:w-auto bg-red-600 text-white px-6 py-2 rounded-md hover:bg-red-700 font-bold transition shadow-sm">
                    تأكيد الإغلاق
                </button>
            </div>
            <div id="blocked-dates-list" class="mt-4 flex flex-wrap gap-2 text-sm">
                <span class="text-gray-500">جاري تحميل الأيام المغلقة...</span>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h2 class="text-2xl font-bold text-gray-800">جدول الحجوزات الحالية</h2>
            
            <div class="flex gap-2">
                <button id="btn-abo-amr" onclick="setFilter('أبو عمرو')" class="bg-gray-800 text-white px-4 py-1.5 rounded-md text-sm transition font-bold shadow">أبو عمرو</button>
                <button id="btn-yousef" onclick="setFilter('يوسف')" class="bg-white text-gray-700 border border-gray-300 px-4 py-1.5 rounded-md text-sm hover:bg-gray-100 transition shadow-sm">يوسف</button>
                <button id="btn-fekry" onclick="setFilter('فكري')" class="bg-white text-gray-700 border border-gray-300 px-4 py-1.5 rounded-md text-sm hover:bg-gray-100 transition shadow-sm">فكري</button>
            </div>

            <div class="text-sm bg-blue-100 text-blue-800 px-3 py-1 rounded-full font-bold">
                العدد: <span id="total-bookings">0</span>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden overflow-x-auto">
            <table class="w-full text-right border-collapse">
                <thead class="hidden md:table-header-group">
                    <tr class="bg-gray-800 text-white text-sm">
                        <th class="p-4">العميل</th>
                        <th class="p-4">رقم الموبايل</th>
                        <th class="p-4">الحلاق</th>
                        <th class="p-4">الموعد</th>
                        <th class="p-4">إجراءات</th>
                    </tr>
                </thead>
                <tbody id="bookings-table-body" class="text-gray-700">
                    </tbody>
            </table>
        </div>
    </main>

    <script type="module" src="admin.js"></script>
</body>
</html>
