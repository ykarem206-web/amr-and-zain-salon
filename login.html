<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogIn to Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h2 class="text-3xl font-bold text-center text-gray-800 mb-6 italic">AMR & ZAIN</h2>
        <h3 class="text-xl text-center text-gray-600 mb-8">تسجيل الدخول للإدارة</h3>
        
        <div class="space-y-4">
            <div>
                <label class="block text-gray-700 font-bold mb-2">البريد الإلكتروني</label>
                <input type="email" id="email" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-gray-800 text-left" dir="ltr" placeholder="admin@salon.com">
            </div>
            
            <div>
                <label class="block text-gray-700 font-bold mb-2">كلمة المرور</label>
                <input type="password" id="password" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-gray-800 text-left" dir="ltr" placeholder="********">
            </div>

            <p id="error-msg" class="text-red-500 text-sm hidden text-center font-bold">البريد أو كلمة المرور غير صحيحة!</p>

            <button id="login-btn" class="w-full bg-gray-800 text-white font-bold py-3 rounded-md hover:bg-black transition shadow-md">
                دخول
            </button>
        </div>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
